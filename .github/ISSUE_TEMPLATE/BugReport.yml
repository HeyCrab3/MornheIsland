name: Bug 反馈
description: 在使用 MornheIsland 时遇到 Bug？请在此提交反馈，我们会尽快处理。
title: "[Bug] 标题"
labels: [bug]
type: bug
body:
  - type: markdown
    attributes:
      value: |
        感谢您进行 Bug 反馈。请在上面的文本框⬆️起一个能够清晰描述您的问题的标题，便于开发者解决您的问题。

        > [!important]
        > 重要：如果要提出**多个 Bug**，请为每一个 Bug 开一个单独的 issue。
        >
        > 如果您不知道如何有效、精准地表述，我们建议您先阅读《提问的智慧》（[链接](https://github.com/ryanhanwu/How-To-Ask-Questions-The-Smart-Way/blob/main/README-zh_CN.md)）。
  - type: checkboxes
    id: checkboxes
    attributes:
      label: 请确认您已完成以下操作：
      options:
        - label: 我已搜索过现有的 issue，确认没有重复的 Bug。
          required: true
        - label: 我已阅读过《提问的智慧》，并按照其中的建议来描述我的问题。
          required: true
  - type: markdown
    attributes: 
      value: |
        ### Bug 信息

        描述您遇到的 Bug。您可以附上截图、录屏、控制台日志等材料，便于开发者追踪问题。

        > [!note]
        > 上传附件时**请优先使用 GitHub 的附件系统上传附件**，将需要上传的附件粘贴或拖动到撰写区域即可上传。多个文件可打包为 zip 格式后上传。**尽量避免使用需要登陆或安装客户端才能接收附件的网盘（如\*度网盘、\*克网盘、1\*3网盘等）上传附件**，以避免开发者因不具有对应网盘客户端或账户而延误问题诊断。
  - type: textarea
    id: excepted
    attributes:
      label: 期望的行为
      description: 详细的描述你期望发生的行为，突出与目前（可能不正确的）行为的不同。
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: 实际结果
      description: 实际发生的行为。
    validations:
      required: true
  - type: textarea
    id: reproduce-steps
    attributes:
      label: 重现步骤
      description: |
        详细描述要怎么操作才能再次触发这个 Bug。
      placeholder: |
        1. 首先……
        2. 然后……
        3. ……
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: 截图/录屏（可选，建议）
      description: |
        如果可能，请提供可以用来进一步描述您的问题的截图或录屏。
  - type: textarea
    id: logs
    attributes:
      label: 控制台日志（可选，建议）
      description: |
        如果可能，请提供可以用来进一步描述您的问题的控制台日志。
  - type: textarea
    id: user_id
    attributes:
      label: 用户 ID
      description: |
        请提供您水印上的用户ID（可以在用户设置页面中找到），便于我们快速定位问题。
    validations:
      required: true
  - type: checkboxes
    id: revision
    attributes:
      label: 最后一步
      description: 回顾您的回答
      options:
        - label: 我认为上述的描述已经足以详细，以允许开发人员能复现该问题。如果我的 issue 没有按照上述的要求填写，可能会被无条件关闭。
          required: true